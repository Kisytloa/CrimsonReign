  <script>
  document.addEventListener('DOMContentLoaded',function(){
    const role = (localStorage.getItem('userRole')||'').trim();
    const gear = document.getElementById('admin-gear');
    if (gear) gear.style.display = (role === 'Administrateur') ? 'flex' : 'none';
  });
  </script>
  <script>
  document.addEventListener('DOMContentLoaded',function(){
    const role = (localStorage.getItem('userRole')||'').trim();
    const navLi = document.querySelector('li.nav-annonce');
    if (navLi) {
        if (role === 'Administrateur' || role === 'Modérateur') {
            navLi.style.display = 'list-item';
            const adminLink = document.querySelector('#nav-gear-menu a[data-role="admin"]');
            if (adminLink) adminLink.style.display = (role === 'Administrateur') ? 'flex' : 'none';
        } else { navLi.style.display='none'; }
    }
    const navGearSvg = document.getElementById('nav-gear-svg');
    const navGearFallback = document.getElementById('nav-gear-fallback');
    if (navGearSvg && navGearFallback) {
        try { const box = navGearSvg.getBBox(); if(!box || box.width===0){ navGearSvg.style.display='none'; navGearFallback.style.display='flex'; } }
        catch(e){ navGearSvg.style.display='none'; navGearFallback.style.display='flex'; }
    }
    const gearToggle = document.getElementById('nav-gear-toggle');
    const gearMenu = document.getElementById('nav-gear-menu');
    if (gearToggle && gearMenu) {
        const closeMenu=()=>{ gearMenu.style.display='none'; gearToggle.setAttribute('aria-expanded','false'); };
        const openMenu=()=>{ gearMenu.style.display='block'; gearToggle.setAttribute('aria-expanded','true'); };
        gearToggle.addEventListener('click',e=>{ e.preventDefault(); if(gearMenu.style.display==='block'){closeMenu();} else {openMenu();} });
        document.addEventListener('click',e=>{ if(!gearMenu.contains(e.target)&& e.target!==gearToggle && !gearToggle.contains(e.target)) closeMenu(); });
        document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeMenu(); });
        gearMenu.querySelectorAll('a').forEach(a=>{ a.addEventListener('mouseenter',()=>a.style.background='#272229'); a.addEventListener('mouseleave',()=>a.style.background='transparent'); });
    }
    const resToggle = document.getElementById('nav-ressources-toggle');
    const resMenu = document.getElementById('nav-ressources-menu');
    if (resToggle && resMenu) {
        const closeRes=()=>{ resMenu.style.display='none'; resToggle.setAttribute('aria-expanded','false'); };
        const openRes=()=>{ resMenu.style.display='block'; resToggle.setAttribute('aria-expanded','true'); };
        resToggle.addEventListener('click',e=>{ e.preventDefault(); if(resMenu.style.display==='block'){closeRes();} else {openRes();} });
        document.addEventListener('click',e=>{ if(!resMenu.contains(e.target)&& e.target!==resToggle && !resToggle.contains(e.target)) closeRes(); });
        document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeRes(); });
        resMenu.querySelectorAll('a').forEach(a=>{ a.addEventListener('mouseenter',()=>a.style.background='#272229'); a.addEventListener('mouseleave',()=>a.style.background='transparent'); });
    }
  // Raid dropdown
  const raidToggle = document.getElementById('nav-raid-toggle');
  const raidMenu = document.getElementById('nav-raid-menu');
  if (raidToggle && raidMenu) {
    const closeRaid=()=>{ raidMenu.style.display='none'; raidToggle.setAttribute('aria-expanded','false'); };
    const openRaid=()=>{ raidMenu.style.display='block'; raidToggle.setAttribute('aria-expanded','true'); };
    raidToggle.addEventListener('click',e=>{ e.preventDefault(); if(raidMenu.style.display==='block'){closeRaid();} else {openRaid();} });
    document.addEventListener('click',e=>{ if(!raidMenu.contains(e.target)&& e.target!==raidToggle && !raidToggle.contains(e.target)) closeRaid(); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeRaid(); });
    raidMenu.querySelectorAll('a').forEach(a=>{ a.addEventListener('mouseenter',()=>a.style.background='#272229'); a.addEventListener('mouseleave',()=>a.style.background='transparent'); });
  }
  });
  </script>
