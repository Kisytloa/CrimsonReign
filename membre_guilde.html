<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membres de la Guilde BloodShadow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="Logo guilde.jpg" alt="Logo Guilde" class="logo gauche">
        <img src="Logo guilde.jpg" alt="Logo Guilde" class="logo droite">
        <h1>Membres de la Guilde BloodShadow</h1>
        <nav>
            <ul>
                <li><a href="planning.html">Planning de Raid</a></li>
                <li><a href="https://maxroll.gg/lost-ark/raids" target="_blank">Guide Raid</a></li>
                <li><a href="https://docs.google.com/spreadsheets/d/1KtZ0lKySaKDaPmwb_5dUeSyjtrVZDjtSKiGXLsqjH4c/edit?pli=">Excel Raid</a></li>
                <li><a href="https://www.lostark.nexus" target="_blank">Build Personnages</a></li>
                <li><a href="https://www.playlostark.com/fr-fr/news" target="_blank">News Lost Ark</a></li>
                <li><a href="https://www.playlostark.com/fr-fr/support/server-status" target="_blank">Server Status</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="membre_guilde">
            <h2>Gestion des membres</h2>
            <div id="liste-joueurs"></div>
        </section>

        <!-- Pop-up ajout perso -->
        <div id="popup-ajout-personnage" class="popup">
            <div class="popup-content">
                <span class="popup-close-btn" id="close-popup-personnage">×</span>
                <h3>Ajouter un personnage à <span id="joueur-selectionne"></span></h3>

                <label for="archetype-personnage">Archétype :</label>
                <select id="archetype-personnage">
                    <option value="">Sélectionner un archétype</option>
                </select>

                <label for="classe-personnage">Classe :</label>
                <select id="classe-personnage" disabled>
                    <option value="">Sélectionner une classe</option>
                </select>

                <label for="nom-personnage">Nom du perso :</label>
                <input type="text" id="nom-personnage">

                <label for="ilvl-personnage">iLvl :</label>
                <input type="number" id="ilvl-personnage">

                <button id="valider-ajout-personnage">Ajouter</button>

                <hr>

                <!-- Sélecteur de personnage à mettre à jour ou supprimer -->
                <h3>Modifier ou supprimer un personnage</h3>

                <label for="select-character">Sélectionner un personnage :</label>
                <select id="select-character">
                    <option value="">-- Sélectionner un personnage --</option>
                </select>

                <label for="update-ilvl-personnage">Nouveau iLvl :</label>
                <input type="number" id="update-ilvl-personnage" placeholder="Nouveau iLvl">

                <button id="update-ilvl-btn">Mettre à jour l'iLvl</button>
                <button id="delete-character-btn">Supprimer ce personnage</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.17.0/firebase-firestore.js";
        
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBfJubhqQFQNo8fxVLKh1DKlfisJhZYwGI",
            authDomain: "bloodshadowsite-d35ce.firebaseapp.com",
            projectId: "bloodshadowsite-d35ce",
            storageBucket: "bloodshadowsite-d35ce.firebasestorage.app",
            messagingSenderId: "368188025874",
            appId: "1:368188025874:web:cfdd31f87651f1a3737ccb",
            measurementId: "G-1PJ7HXSP6J"
        };
    
        // Initialiser Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const archetypesClasses = {
            "Guerrier": ["Berserker", "Paladin", "Destructeur", "Gunlancer"],
            "Guerrière": ["Slayer", "Paladine"],
            "Mage": ["Sorcière", "Arcaniste", "Barde", "Invocatrice"],
            "Martialiste Femme": ["Elementiste", "Spirite", "Lancière", "Pugiliste"],
            "Martialiste Homme": ["Striker", "Breaker"],
            "Assassin": ["Sanguelame", "Démoniste", "Faucheuse", "Dévoreuse d'âme"],
            "Gunner": ["Gunner", "Sagittaire", "Artilleur", "Machiniste"],
            "Gunneuse": ["Gunneuse"],
            "Spécialiste": ["Artiste", "Helètempète", "Ame sauvage"]
        };

        // Charger les joueurs depuis Firestore
        async function chargerJoueurs() {
            const joueursRef = collection(db, "joueurs");
            const snapshot = await getDocs(joueursRef);
            return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        }

        // Afficher les joueurs et leurs personnages
        async function afficherJoueurs() {
            const joueurs = await chargerJoueurs(); // Récupère les joueurs
            const listeJoueurs = document.getElementById("liste-joueurs");
            listeJoueurs.innerHTML = ""; // Vider la liste avant de la remplir

            if (joueurs.length === 0) {
                listeJoueurs.innerHTML = "<p>Aucun joueur trouvé.</p>";
            } else {
                joueurs.forEach(joueur => {
                    const div = document.createElement("div");
                    div.innerHTML = `
                        <h3>${joueur.nom}</h3>
                        <button onclick="ouvrirAjoutPerso('${joueur.id}')">Ajouter un personnage</button>
                        <ul>
                            ${joueur.personnages && joueur.personnages.length > 0 ? 
                                joueur.personnages.map(p => 
                                    `<li>${p.nom} (${p.classe}) - iLvl ${p.ilvl}</li>`).join('') :
                                "<li>Aucun personnage</li>"
                            }
                        </ul>
                        <hr>
                    `;
                    listeJoueurs.appendChild(div);
                });
            }
        }

        // Fonction pour ouvrir la pop-up d'ajout de personnage
        window.ouvrirAjoutPerso = function(joueurId) {
            // Afficher la pop-up
            document.getElementById("joueur-selectionne").textContent = joueurId;
            document.getElementById("popup-ajout-personnage").style.display = "block";
           
            // Remplir la liste des archétypes
            const archetypeSelect = document.getElementById("archetype-personnage");
            archetypeSelect.innerHTML = '<option value="">Sélectionner un archétype</option>';
            Object.keys(archetypesClasses).forEach(archetype => {
                const option = document.createElement("option");
                option.value = archetype;
                option.textContent = archetype;
                archetypeSelect.appendChild(option);
            });

            // Réinitialiser et désactiver la sélection de classe
            const classeSelect = document.getElementById("classe-personnage");
            classeSelect.innerHTML = '<option value="">Sélectionner une classe</option>';
            classeSelect.disabled = true;

            // Récupérer les personnages du joueur sélectionné pour remplir la liste déroulante
            remplirListePersonnages(joueurId);
        }

        // Fonction pour remplir la liste des personnages
        async function remplirListePersonnages(joueurId) {
            const joueurRef = doc(db, "joueurs", joueurId);
            const joueurDoc = await getDoc(joueurRef);
            const joueur = joueurDoc.data();

            // Réinitialiser la liste des personnages
            const selectCharacter = document.getElementById("select-character");
            selectCharacter.innerHTML = '<option value="">-- Sélectionner un personnage --</option>';

            // Ajouter les personnages à la liste déroulante
            if (joueur.personnages && joueur.personnages.length > 0) {
                joueur.personnages.forEach(perso => {
                    const option = document.createElement("option");
                    option.value = perso.nom;
                    option.textContent = `${perso.nom} (${perso.classe}) - iLvl ${perso.ilvl}`;
                    selectCharacter.appendChild(option);
                });
            } else {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "Aucun personnage";
                selectCharacter.appendChild(option);
            }
        }

        // Mise à jour des classes en fonction de l'archétype sélectionné
        document.getElementById("archetype-personnage").addEventListener('change', function() {
            const selectedArchetype = this.value;
            const classeSelect = document.getElementById("classe-personnage");

            // Vider la liste des classes
            classeSelect.innerHTML = '<option value="">Sélectionner une classe</option>';
            classeSelect.disabled = true;

            if (selectedArchetype && archetypesClasses[selectedArchetype]) {
                // Activer et remplir la liste des classes en fonction de l'archétype
                archetypesClasses[selectedArchetype].forEach(classe => {
                    const option = document.createElement("option");
                    option.value = classe;
                    option.textContent = classe;
                    classeSelect.appendChild(option);
                });
                classeSelect.disabled = false; // Activer la sélection de classe
            }
        });

        // Ajouter un personnage à un joueur
        document.getElementById("valider-ajout-personnage").addEventListener('click', async function() {
            const joueurId = document.getElementById("joueur-selectionne").textContent;
            const archetype = document.getElementById("archetype-personnage").value;
            const classe = document.getElementById("classe-personnage").value;
            const nomPerso = document.getElementById("nom-personnage").value;
            const ilvl = document.getElementById("ilvl-personnage").value;

            if (archetype && classe && nomPerso && ilvl) {
                const joueurRef = doc(db, "joueurs", joueurId);
                const joueurDoc = await getDoc(joueurRef);
                const joueur = joueurDoc.data();
                joueur.personnages.push({
                    nom: nomPerso,
                    archetype: archetype,
                    classe: classe,
                    ilvl: ilvl
                });
                await updateDoc(joueurRef, {
                    personnages: joueur.personnages
                });
                afficherJoueurs();
                document.getElementById("popup-ajout-personnage").style.display = "none"; // Fermer la fenêtre
            }
        });

        // Mise à jour de l'iLvl du personnage
        document.getElementById("update-ilvl-btn").addEventListener('click', async function() {
            const joueurId = document.getElementById("joueur-selectionne").textContent;
            const personnageNom = document.getElementById("select-character").value;
            const nouveauIlvl = document.getElementById("update-ilvl-personnage").value;

            const joueurRef = doc(db, "joueurs", joueurId);
            const joueurDoc = await getDoc(joueurRef);
            const joueur = joueurDoc.data();
            const personnage = joueur.personnages.find(p => p.nom === personnageNom);
            if (personnage && nouveauIlvl) {
                personnage.ilvl = nouveauIlvl;
                await updateDoc(joueurRef, {
                    personnages: joueur.personnages
                });
                alert("iLvl mis à jour !");
                afficherJoueurs();
            } else {
                alert("Personnage non trouvé ou iLvl invalide !");
            }
        });

        // Supprimer un personnage
        document.getElementById("delete-character-btn").addEventListener('click', async function() {
            const joueurId = document.getElementById("joueur-selectionne").textContent;
            const personnageNom = document.getElementById("select-character").value;

            const joueurRef = doc(db, "joueurs", joueurId);
            const joueurDoc = await getDoc(joueurRef);
            const joueur = joueurDoc.data();
            joueur.personnages = joueur.personnages.filter(p => p.nom !== personnageNom);
            await updateDoc(joueurRef, {
                personnages: joueur.personnages
            });
            alert("Personnage supprimé !");
            afficherJoueurs();
            document.getElementById("popup-ajout-personnage").style.display = "none"; // Fermer la fenêtre
        });

        // Fermer la fenêtre popup
        document.getElementById("close-popup-personnage").addEventListener('click', function() {
            document.getElementById("popup-ajout-personnage").style.display = "none";
        });

        // Fermer la pop-up si l'utilisateur clique en dehors
        document.getElementById('popup-ajout-personnage').addEventListener('click', function(event) {
            if (event.target === this) {
                document.getElementById("popup-ajout-personnage").style.display = 'none';
            }
        });

        afficherJoueurs(); // Appeler la fonction pour afficher les joueurs
    </script>

</body>

</html>
