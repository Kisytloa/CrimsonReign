    <header>

            <nav>
                <ul>
                    <li><a href="index.html">Accueil</a></li>

                </ul>
            </nav>
        </div>
    </header>

    <main class="container annonce-container">
        <h1>Gérer l'annonce</h1>
        <div class="annonce-help">Astuce: vous pouvez utiliser le Markdown (titres, listes, liens, gras, etc.).</div>
        <form id="annonce-form">
            <textarea id="annonce-content" rows="12" placeholder="Écrivez votre annonce ici (supporte le Markdown)"></textarea>
            <div class="buttons annonce-actions">
                <button type="submit">Publier / Modifier l'annonce</button>
                <button type="button" id="delete-button" class="btn-danger">Supprimer l'annonce</button>
            </div>
            <div class="annonce-preview" id="annonce-preview" style="display:none;"></div>
        </form>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 CrimsonReign. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/1.9.1/showdown.min.js"></script>
    <script>
        // Aperçu Markdown en direct (optionnel)
        const textarea = document.getElementById('annonce-content');
        const preview = document.getElementById('annonce-preview');
        const converter = new showdown.Converter({tables:true, strikethrough:true, tasklists:true});
        function updatePreview() {
            const val = textarea.value.trim();
            if (!val) { preview.style.display='none'; preview.innerHTML=''; return; }
            preview.style.display = 'block';
            preview.innerHTML = converter.makeHtml(val);
        }
        textarea.addEventListener('input', updatePreview);
        document.addEventListener('DOMContentLoaded', updatePreview);
        // Affichage conditionnel du lien "Annonce" sur cette page
        document.addEventListener('DOMContentLoaded', function() {
            const role = (localStorage.getItem('userRole') || '').trim();
            const li = document.querySelector('li.nav-annonce');
            if (li) li.style.display = (role === 'Administrateur' || role === 'Modérateur') ? 'list-item' : 'none';
            const gear = document.getElementById('admin-gear');
            if (gear) gear.style.display = (role === 'Administrateur') ? 'flex' : 'none';
        });
    </script>
    <script src="annonce.js"></script>
</body>
</html>
